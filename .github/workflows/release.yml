name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into game
        shell: bash
        run: |
          echo "return \"${{ steps.version.outputs.version }}\"" > version.lua

      - name: Create .love file
        shell: bash
        run: |
          7z a -tzip ballz.love *.lua -x!installer.iss

      - name: Download LOVE for Windows
        shell: bash
        run: |
          LOVE_VERSION="11.5"
          curl -L -o love-win64.zip "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-win64.zip"
          7z x love-win64.zip
          mv love-${LOVE_VERSION}-win64 love-win64

      - name: Generate app icon
        shell: bash
        run: |
          # Create a ball icon: bright circle on dark background with highlight
          magick -size 256x256 xc:"#14141E" \
            -fill "#E64D4D" -draw "circle 128,128 128,28" \
            -fill "#FF8080" -draw "circle 100,100 100,75" \
            -fill "#FFB3B3" -draw "circle 90,90 90,80" \
            ballz-256.png
          # Convert to .ico with multiple sizes
          magick ballz-256.png \
            \( -clone 0 -resize 16x16 \) \
            \( -clone 0 -resize 32x32 \) \
            \( -clone 0 -resize 48x48 \) \
            \( -clone 0 -resize 64x64 \) \
            \( -clone 0 -resize 128x128 \) \
            \( -clone 0 -resize 256x256 \) \
            -delete 0 ballz.ico

      - name: Download rcedit
        shell: bash
        run: |
          curl -L -o rcedit.exe "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"

      - name: Fuse Windows executable
        shell: bash
        run: |
          # Set icon on love.exe BEFORE fusing — rcedit after fuse corrupts the appended .love data
          ./rcedit.exe love-win64/love.exe --set-icon ballz.ico
          cat love-win64/love.exe ballz.love > love-win64/ballz.exe
          rm love-win64/love.exe love-win64/lovec.exe
          # Copy icon for installer shortcuts
          cp ballz.ico love-win64/ballz.ico
          mv love-win64 ballz-win64

      - name: Package zip
        shell: bash
        run: 7z a ballz-win64.zip ballz-win64/

      - name: Build installer
        shell: cmd
        env:
          BALLZ_VERSION: ${{ steps.version.outputs.version }}
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ballz-win64.zip
            ballz.love
            output/ballz-setup-${{ steps.version.outputs.version }}.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into game
        run: |
          echo "return \"${{ steps.version.outputs.version }}\"" > version.lua

      - name: Create .love file
        run: |
          zip -9 ballz.love *.lua

      - name: Download LOVE AppImage
        run: |
          LOVE_VERSION="11.5"
          curl -L -o love.AppImage "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-x86_64.AppImage"

      - name: Build AppImage
        run: |
          # Extract LÖVE AppImage using squashfs-tools (no FUSE or libfuse2 needed)
          # Find the real squashfs offset (skip first 128KB to avoid false 'hsqs'
          # matches inside the ELF runtime binary code)
          OFFSET=$(python3 -c "
          data = open('love.AppImage', 'rb').read()
          offset = data.find(b'hsqs', 131072)
          assert offset != -1, 'squashfs magic not found'
          print(offset)
          ")
          echo "SquashFS offset: $OFFSET"
          head -c "$OFFSET" love.AppImage > runtime
          unsquashfs -offset "$OFFSET" -dest squashfs-root love.AppImage

          # Fuse the love binary with the game (append .love to the ELF binary)
          # This makes love.filesystem.isFused() return true, same as the Windows build
          LOVE_BIN=$(find squashfs-root -name love -type f -executable | head -1)
          echo "Fusing game into: $LOVE_BIN"
          cat "$LOVE_BIN" ballz.love > "${LOVE_BIN}.fused"
          mv "${LOVE_BIN}.fused" "$LOVE_BIN"
          chmod +x "$LOVE_BIN"

          # Update desktop entry name
          sed -i 's/^Name=.*/Name=Ballz/' squashfs-root/love.desktop

          # Repackage: original runtime + new squashfs = working AppImage
          mksquashfs squashfs-root/ payload.squashfs -root-owned -noappend
          cat runtime payload.squashfs > ballz-x86_64.AppImage
          chmod +x ballz-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ballz-x86_64.AppImage

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into game
        run: |
          echo "return \"${{ steps.version.outputs.version }}\"" > version.lua

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Use the committed debug keystore at .ci/debug.keystore as the single
      # source of truth for APK signing. A stable key means every release
      # installs as an in-place update instead of "App not installed as
      # package conflicts with an existing package".
      #
      # Debug keystores are not secret: the cert DN, passwords, and alias
      # are all public AGP defaults; an attacker knowing these does not
      # let them sign updates without the private key, and the private
      # key is only used to sign side-loaded dev APKs (Play Store requires
      # a separate release key anyway).
      - name: Install debug keystore
        run: |
          mkdir -p ~/.android
          cp .ci/debug.keystore ~/.android/debug.keystore
          # Print the SHA-256 fingerprint so signature stability across
          # runs is visible in the workflow log (must match the fingerprint
          # reported by "Dump APK metadata" later).
          keytool -list -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            | grep -E 'SHA256:'

      # Cache the entire love-android clone, NDK build outputs, AND
      # app/build (Gradle's incremental build intermediates: aapt2, javac,
      # dex, manifest merge, linked native libs). Preserving app/build is
      # what makes "Build APK" fast on Lua-only changes: Gradle's input
      # hashes then show only src/embed/assets/*.lua changed, so only
      # mergeAssets + packageDebug re-run.
      #
      # Rolling SHA-keyed primary key with a prefix restore-key so each run
      # saves a fresh cache AND restores the most recent prior cache on
      # miss. Static keys (previous design) never updated after the first
      # save, so app/build intermediates grew stale.
      - name: Cache love-android (clone + build intermediates)
        id: cache-love-android
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-11.5-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            love-android-11.5-${{ runner.os }}-

      - name: Clone love-android
        if: steps.cache-love-android.outputs.cache-hit != 'true'
        run: git clone --depth 1 --shallow-submodules --recurse-submodules --branch 11.5 https://github.com/love2d/love-android love-android

      # Cache Gradle home (~/.gradle) — dependencies, wrapper, daemon jars,
      # and the cross-task build cache in caches/build-cache-*. Rolling key
      # so build-cache entries keep getting refreshed on every run.
      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-love-android-11.5-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-love-android-11.5-
            ${{ runner.os }}-gradle-

      # love-android 11.5 ships no signingConfigs block, so AGP falls back to
      # its auto-generated debug key in ~/.android/debug.keystore. In practice
      # that auto-generation path is unreliable on CI runners (HOME drift,
      # permissions, cold caches), producing a different signing cert every
      # build. Pin the debug signingConfig to our committed keystore so every
      # APK is signed with the same key.
      - name: Pin debug signingConfig in love-android
        run: |
          KS_PATH="$(pwd)/.ci/debug.keystore"
          python3 - "$KS_PATH" <<'PY'
          import sys, pathlib
          ks_path = sys.argv[1]
          f = pathlib.Path("love-android/app/build.gradle")
          src = f.read_text()
          # Skip if already injected (love-android clone is cached across
          # runs; we must not keep stacking signingConfigs blocks).
          if "BALLZ_SIGNING_PINNED" in src:
              print("signingConfigs already pinned, skipping")
              sys.exit(0)
          marker = "android {"
          assert marker in src, "android { block not found in love-android/app/build.gradle"
          injection = f"""android {{
              // BALLZ_SIGNING_PINNED
              signingConfigs {{
                  debug {{
                      storeFile file('{ks_path}')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }}
              }}
          """
          patched = src.replace(marker, injection, 1)
          f.write_text(patched)
          print("Injected signingConfigs.debug pointing at", ks_path)
          PY
          grep -A 8 'signingConfigs' love-android/app/build.gradle

      # versionCode must increase with every release for Android to recognise
      # an APK as an update. Use the workflow run number (auto-increments).
      # love-android's build.gradle reads app.version_code / app.version_name
      # from gradle.properties (not the bare versionCode / versionName keys).
      - name: Set versionCode
        run: |
          sed -i "s/^app\.version_code=.*/app.version_code=${{ github.run_number }}/" love-android/gradle.properties
          sed -i "s/^app\.version_name=.*/app.version_name=${{ steps.version.outputs.version }}/" love-android/gradle.properties

      # Explicitly set R.bool.embed=true in the app module's embed flavor
      # source set. The value is defined in the love/ submodule but overriding
      # it here guarantees it is set regardless of submodule state.
      - name: Set embed=true resource
        run: |
          mkdir -p love-android/app/src/embed/res/values
          cat > love-android/app/src/embed/res/values/bools.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <bool name="embed">true</bool>
          </resources>
          EOF

      # AndroidManifest.xml uses android:label="${NAME}" — a Gradle manifest
      # placeholder resolved from app.name / app.name_byte_array in
      # gradle.properties, NOT from @string/app_name. Override both so the
      # launcher title is "Ballz" instead of the default "LÖVE for Android".
      #
      # Also override app.application_id: love-android's default is
      # org.love2d.android, which collides with any other LÖVE-based app on
      # the device ("App not installed as package conflicts with an existing
      # package"). A unique ID makes this install cleanly as its own app.
      - name: Override app name and package ID in gradle.properties
        run: |
          sed -i 's/^app\.name_byte_array=/#app.name_byte_array=/' love-android/gradle.properties
          if grep -q '^#app\.name=' love-android/gradle.properties; then
            sed -i 's/^#app\.name=.*/app.name=Ballz/' love-android/gradle.properties
          elif ! grep -q '^app\.name=' love-android/gradle.properties; then
            echo 'app.name=Ballz' >> love-android/gradle.properties
          fi
          if grep -q '^app\.application_id=' love-android/gradle.properties; then
            sed -i 's/^app\.application_id=.*/app.application_id=com.kurtmc.ballz/' love-android/gradle.properties
          else
            echo 'app.application_id=com.kurtmc.ballz' >> love-android/gradle.properties
          fi

      # Icons are deterministic and never change — cache them permanently so
      # apt-get install imagemagick only runs on the very first cache miss.
      - name: Cache Android app icons
        id: cache-android-icons
        uses: actions/cache@v4
        with:
          path: android-icons
          key: android-icons-v2

      # AndroidManifest.xml references android:icon="@drawable/love". love.png
      # exists in drawable-{ldpi..xxxhdpi} in the main source set; overriding
      # every density in the embed flavor replaces the launcher icon.
      - name: Generate Android app icons
        if: steps.cache-android-icons.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          mkdir -p android-icons
          convert -size 512x512 xc:"#14141E" \
            -fill "#E64D4D" -draw "circle 256,256 256,56" \
            -fill "#FF8080" -draw "circle 200,200 200,150" \
            -fill "#FFB3B3" -draw "circle 180,180 180,160" \
            android-icons/ballz-icon.png
          for density in ldpi:36 mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            d="${density%%:*}"
            s="${density##*:}"
            mkdir -p "android-icons/drawable-${d}"
            convert android-icons/ballz-icon.png -resize "${s}x${s}" \
              "android-icons/drawable-${d}/love.png"
          done

      - name: Copy icons to embed res
        run: |
          for density in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "love-android/app/src/embed/res/drawable-${density}"
            cp "android-icons/drawable-${density}/love.png" \
               "love-android/app/src/embed/res/drawable-${density}/"
          done

      # In LÖVE 11.5 the game.love-from-assets path is disabled (experimental).
      # The working path is: put loose files in assets/ so checkFusedGame finds
      # main.lua, returns gameLoveIO=null, and initializeVirtualArchive() mounts
      # the whole assets/ directory as the game source.
      - name: Embed game files into Android assets
        run: |
          # Wipe ALL possible asset source sets that could contain a stale
          # game.love from earlier CI runs (first attempt used src/main/assets,
          # later runs used src/embed/assets; both sets are merged by Gradle).
          # game.love must be absent so checkFusedGame() falls through to main.lua,
          # triggering initializeVirtualArchive() — the only working embed path in
          # LÖVE 11.5 (the game.love-from-assets IO path is marked experimental
          # and deliberately destroyed without mounting).
          rm -rf love-android/app/src/main/assets
          rm -rf love-android/app/src/embed/assets
          mkdir -p love-android/app/src/embed/assets
          cp *.lua love-android/app/src/embed/assets/

      # Enable Gradle's parallel execution, cross-task build cache, and
      # daemon so cached app/build intermediates are actually reused.
      # Without parallel+caching flags Gradle still runs tasks serially
      # and doesn't consult the task-output cache even when the cache
      # entry exists.
      - name: Tune Gradle for fast incremental builds
        run: |
          # Idempotent: love-android is cached so the properties may already
          # contain the marker from a prior run — don't duplicate.
          if ! grep -q '^# BALLZ_PERF_TUNED' love-android/gradle.properties; then
            cat >> love-android/gradle.properties <<'EOF'
          # BALLZ_PERF_TUNED
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          fi

      # Gradle re-evaluates task inputs and skips up-to-date tasks. Since
      # app/build is restored from cache and only src/embed/assets changed,
      # mergeAssets + packageDebug are the only tasks that typically re-run.
      # --build-cache enables the task-output cache pulled from ~/.gradle.
      - name: Build APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --build-cache

      - name: Collect APK
        run: |
          APK=$(find love-android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" ballz-android.apk

      # Surface the resolved applicationId and the APK's signing fingerprint
      # so it's obvious in the log whether the package ID override landed and
      # whether the keystore is stable across runs (signature must not drift
      # or every reinstall produces a "package conflicts" error).
      - name: Dump APK metadata
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          if [ -x "${BUILD_TOOLS}aapt" ]; then
            "${BUILD_TOOLS}aapt" dump badging ballz-android.apk | grep -E '^(package|application-label)'
          elif [ -x "${BUILD_TOOLS}aapt2" ]; then
            "${BUILD_TOOLS}aapt2" dump badging ballz-android.apk | grep -E '^(package|application-label)'
          fi
          # APK signing fingerprint (SHA-256 of signing cert)
          unzip -p ballz-android.apk META-INF/ANDROIDD.RSA 2>/dev/null \
            | keytool -printcert 2>/dev/null | grep -E 'SHA256:' || \
          unzip -p ballz-android.apk META-INF/CERT.RSA 2>/dev/null \
            | keytool -printcert 2>/dev/null | grep -E 'SHA256:' || \
          echo "(APK signature info unavailable)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: ballz-android.apk

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: Ballz ${{ needs.build-windows.outputs.tag }}
          files: |
            windows-build/ballz-win64.zip
            windows-build/ballz.love
            windows-build/output/ballz-setup-${{ needs.build-windows.outputs.version }}.exe
            linux-build/ballz-x86_64.AppImage
            android-build/ballz-android.apk
          generate_release_notes: true
