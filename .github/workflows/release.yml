name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into game
        shell: bash
        run: |
          echo "return \"${{ steps.version.outputs.version }}\"" > version.lua

      - name: Create .love file
        shell: bash
        run: |
          7z a -tzip ballz.love *.lua -x!installer.iss

      - name: Download LOVE for Windows
        shell: bash
        run: |
          LOVE_VERSION="11.5"
          curl -L -o love-win64.zip "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-win64.zip"
          7z x love-win64.zip
          mv love-${LOVE_VERSION}-win64 love-win64

      - name: Generate app icon
        shell: bash
        run: |
          # Create a ball icon: bright circle on dark background with highlight
          magick -size 256x256 xc:"#14141E" \
            -fill "#E64D4D" -draw "circle 128,128 128,28" \
            -fill "#FF8080" -draw "circle 100,100 100,75" \
            -fill "#FFB3B3" -draw "circle 90,90 90,80" \
            ballz-256.png
          # Convert to .ico with multiple sizes
          magick ballz-256.png \
            \( -clone 0 -resize 16x16 \) \
            \( -clone 0 -resize 32x32 \) \
            \( -clone 0 -resize 48x48 \) \
            \( -clone 0 -resize 64x64 \) \
            \( -clone 0 -resize 128x128 \) \
            \( -clone 0 -resize 256x256 \) \
            -delete 0 ballz.ico

      - name: Download rcedit
        shell: bash
        run: |
          curl -L -o rcedit.exe "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"

      - name: Fuse Windows executable
        shell: bash
        run: |
          # Set icon on love.exe BEFORE fusing — rcedit after fuse corrupts the appended .love data
          ./rcedit.exe love-win64/love.exe --set-icon ballz.ico
          cat love-win64/love.exe ballz.love > love-win64/ballz.exe
          rm love-win64/love.exe love-win64/lovec.exe
          # Copy icon for installer shortcuts
          cp ballz.ico love-win64/ballz.ico
          mv love-win64 ballz-win64

      - name: Package zip
        shell: bash
        run: 7z a ballz-win64.zip ballz-win64/

      - name: Build installer
        shell: cmd
        env:
          BALLZ_VERSION: ${{ steps.version.outputs.version }}
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ballz-win64.zip
            ballz.love
            output/ballz-setup-${{ steps.version.outputs.version }}.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into game
        run: |
          echo "return \"${{ steps.version.outputs.version }}\"" > version.lua

      - name: Create .love file
        run: |
          zip -9 ballz.love *.lua

      - name: Download LOVE AppImage
        run: |
          LOVE_VERSION="11.5"
          curl -L -o love.AppImage "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-x86_64.AppImage"

      - name: Build AppImage
        run: |
          # Extract LÖVE AppImage using squashfs-tools (no FUSE or libfuse2 needed)
          # Find the real squashfs offset (skip first 128KB to avoid false 'hsqs'
          # matches inside the ELF runtime binary code)
          OFFSET=$(python3 -c "
          data = open('love.AppImage', 'rb').read()
          offset = data.find(b'hsqs', 131072)
          assert offset != -1, 'squashfs magic not found'
          print(offset)
          ")
          echo "SquashFS offset: $OFFSET"
          head -c "$OFFSET" love.AppImage > runtime
          unsquashfs -offset "$OFFSET" -dest squashfs-root love.AppImage

          # Embed game into the AppImage
          cp ballz.love squashfs-root/

          # Modify AppRun to launch our game instead of bare LÖVE
          # Try quoted "$@" first, then unquoted $@
          sed -i '/exec.*love/s|"\$@"|"${HERE:-${APPDIR}}/ballz.love" "$@"|' squashfs-root/AppRun
          grep -q "ballz.love" squashfs-root/AppRun || \
            sed -i '/exec.*love/s|\$@|"${HERE:-${APPDIR}}/ballz.love" $@|' squashfs-root/AppRun
          # Verify the modification succeeded
          grep -q "ballz.love" squashfs-root/AppRun || { echo "ERROR: Failed to modify AppRun"; cat squashfs-root/AppRun; exit 1; }

          # Update desktop entry name
          sed -i 's/^Name=.*/Name=Ballz/' squashfs-root/love.desktop

          # Repackage: original runtime + new squashfs = working AppImage
          mksquashfs squashfs-root/ payload.squashfs -root-owned -noappend
          cat runtime payload.squashfs > ballz-x86_64.AppImage
          chmod +x ballz-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ballz-x86_64.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: Ballz ${{ needs.build-windows.outputs.tag }}
          files: |
            windows-build/ballz-win64.zip
            windows-build/ballz.love
            windows-build/output/ballz-setup-${{ needs.build-windows.outputs.version }}.exe
            linux-build/ballz-x86_64.AppImage
          generate_release_notes: true
